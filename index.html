<!DOCTYPE html>
<html dir="rtl" lang="ar">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>سلعة — لوحة العمليات</title>
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --brand: #745ff2;
        --brand-light: #ece9fe;
        --brand-dark: #5a45d6;
        --ok: #22c55e;
        --err: #ef4444;
        --bg: #f8f7fc;
        --card: #ffffff;
        --text: #1e1e2e;
        --muted: #71717a;
        --radius: 14px;
        --shadow: 0 2px 12px rgba(116, 95, 242, 0.08);
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'Cairo', sans-serif;
        font-weight: 400;
        background-color: var(--bg);
        color: var(--text);
        min-height: 100vh;
        position: relative;
        direction: rtl;
        line-height: 1.6;
      }
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image: url('PATTERN_URL_HERE');
        background-size: 180px 180px;
        opacity: 0.08;
        pointer-events: none;
        z-index: 0;
      }
      .wrapper {
        position: relative;
        z-index: 1;
        max-width: 900px;
        margin: 0 auto;
        padding: 24px 18px 60px;
        animation: fadeIn 0.5s ease;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .header {
        text-align: center;
        margin-bottom: 28px;
      }
      .header img {
        width: 80px;
        height: 80px;
        border-radius: 20px;
        object-fit: contain;
        margin-bottom: 8px;
      }
      .header h1 {
        font-size: 28px;
        font-weight: 700;
        color: var(--brand);
        margin: 0;
        line-height: 1.2;
      }
      .header p {
        font-size: 14px;
        color: var(--muted);
        font-weight: 400;
        margin-top: 2px;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(
          auto-fit,
          minmax(160px, 1fr)
        );
        gap: 14px;
        margin-bottom: 24px;
      }
      .stat-card {
        background: var(--card);
        border-radius: var(--radius);
        padding: 18px 16px;
        box-shadow: var(--shadow);
        text-align: center;
        border-top: 3px solid var(--brand);
      }
      .stat-card .num {
        font-size: 30px;
        font-weight: 700;
        color: var(--brand);
        line-height: 1.1;
      }
      .stat-card .lbl {
        font-size: 12px;
        color: var(--muted);
        margin-top: 4px;
        font-weight: 600;
      }
      .stat-card.time-card {
        border-top-color: var(--muted);
      }
      .stat-card.time-card .num {
        font-size: 16px;
        color: var(--text);
      }

      .section {
        background: var(--card);
        border-radius: var(--radius);
        padding: 20px;
        box-shadow: var(--shadow);
        margin-bottom: 20px;
      }
      .section-title {
        font-size: 16px;
        font-weight: 700;
        color: var(--brand);
        margin-bottom: 14px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .section-title span {
        font-size: 20px;
      }

      .dist-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
        margin-top: 8px;
      }
      .dist-table th {
        background: var(--brand);
        color: #fff;
        font-weight: 600;
        padding: 10px 8px;
        text-align: center;
      }
      .dist-table th:first-child {
        border-radius: 0 8px 0 0;
      }
      .dist-table th:last-child {
        border-radius: 8px 0 0 0;
      }
      .dist-table td {
        padding: 9px 8px;
        text-align: center;
        border-bottom: 1px solid #f0eef8;
      }
      .dist-table tr:hover td {
        background: var(--brand-light);
      }

      .btn-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 12px 10px;
        border: none;
        border-radius: 10px;
        font-family: 'Cairo', sans-serif;
        font-weight: 600;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.2s ease;
        background: var(--brand);
        color: #fff;
      }
      .btn:hover {
        background: var(--brand-dark);
        transform: translateY(-1px);
      }
      .btn:active {
        transform: scale(0.97);
      }
      .btn:disabled {
        opacity: 0.55;
        cursor: not-allowed;
        transform: none;
      }
      .btn.outline {
        background: transparent;
        color: var(--brand);
        border: 2px solid var(--brand);
      }
      .btn.outline:hover {
        background: var(--brand-light);
      }
      .btn.danger {
        background: var(--err);
      }
      .btn.danger:hover {
        background: #dc2626;
      }
      .btn.full {
        grid-column: 1 / -1;
      }
      .btn .icon {
        font-size: 16px;
      }

      .trigger-list {
        margin-top: 12px;
        font-size: 12px;
        background: #f9f9fb;
        border-radius: 8px;
        padding: 10px 12px;
        max-height: 150px;
        overflow-y: auto;
        display: none;
      }
      .trigger-list.show {
        display: block;
      }
      .trigger-item {
        padding: 4px 0;
        border-bottom: 1px solid #eee;
        display: flex;
        justify-content: space-between;
      }
      .trigger-item:last-child {
        border-bottom: none;
      }
      .trigger-empty {
        color: var(--muted);
        text-align: center;
        padding: 8px;
      }

      .logs-wrapper {
        max-height: 320px;
        overflow-y: auto;
        margin-top: 8px;
      }
      .log-row {
        display: grid;
        grid-template-columns: 26px 1fr auto;
        gap: 8px;
        align-items: start;
        padding: 8px 4px;
        border-bottom: 1px solid #f0eef8;
        font-size: 12px;
      }
      .log-row:last-child {
        border-bottom: none;
      }
      .log-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        margin-top: 5px;
        justify-self: center;
      }
      .log-dot.ok {
        background: var(--ok);
      }
      .log-dot.err {
        background: var(--err);
      }
      .log-info strong {
        font-weight: 600;
        color: var(--text);
      }
      .log-info .details {
        color: var(--muted);
        display: block;
        word-break: break-word;
      }
      .log-meta {
        text-align: left;
        color: var(--muted);
        white-space: nowrap;
        font-size: 11px;
      }
      .logs-actions {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }
      .logs-actions .btn {
        font-size: 12px;
        padding: 8px 16px;
      }

      .overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(255, 255, 255, 0.7);
        z-index: 999;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 14px;
      }
      .overlay.show {
        display: flex;
      }
      .spinner {
        width: 46px;
        height: 46px;
        border: 4px solid var(--brand-light);
        border-top-color: var(--brand);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .overlay-text {
        font-size: 14px;
        font-weight: 600;
        color: var(--brand);
      }

      .toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(80px);
        padding: 12px 28px;
        border-radius: 10px;
        color: #fff;
        font-family: 'Cairo', sans-serif;
        font-weight: 600;
        font-size: 14px;
        z-index: 1000;
        transition: transform 0.35s ease,
          opacity 0.35s ease;
        opacity: 0;
        pointer-events: none;
      }
      .toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }
      .toast.success {
        background: var(--ok);
      }
      .toast.error {
        background: var(--err);
      }

      @media (max-width: 500px) {
        .btn-grid {
          grid-template-columns: 1fr;
        }
        .stats-grid {
          grid-template-columns: 1fr 1fr;
        }
      }
    </style>
  </head>
  <body>
    <!-- Spinner Overlay -->
    <div class="overlay" id="overlay">
      <div class="spinner"></div>
      <div class="overlay-text" id="overlayText">
        جارٍ التنفيذ...
      </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <div class="wrapper">
      <!-- Header -->
      <div class="header">
        <img src="LOGO_URL_HERE" alt="سلعة" />
        <h1>سلعة</h1>
        <p>موردك الأول في الدواجن</p>
      </div>

      <!-- Stats -->
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
          <div class="num" id="statSent">--</div>
          <div class="lbl">Sent to Courier</div>
        </div>
        <div class="stat-card">
          <div class="num" id="statOrderId">--</div>
          <div class="lbl">لديها Order ID</div>
        </div>
        <div class="stat-card">
          <div class="num" id="statTotal">--</div>
          <div class="lbl">إجمالي الصفوف</div>
        </div>
        <div class="stat-card time-card">
          <div class="num" id="statTime">--</div>
          <div class="lbl">آخر تحديث</div>
        </div>
      </div>

      <!-- Distribution Table -->
      <div class="section">
        <div class="section-title">
          <span></span> نتائج التوزيع
        </div>
        <div id="distTableWrap">
          <p
            style="
              color: var(--muted);
              text-align: center;
              font-size: 13px;
            "
          >
            جارٍ تحميل الجدول...
          </p>
        </div>
      </div>

      <!-- Operations -->
      <div class="section">
        <div class="section-title">
          <span></span> العمليات
        </div>
        <div class="btn-grid">
          <button
            class="btn"
            onclick="run('opFetchUpload','رفع طلبات Shipday')"
          >
            <span class="icon"></span> رفع طلبات
            Shipday (غدًا)
          </button>
          <button
            class="btn"
            onclick="run('opUpdateExisting','تحديث طلبات Shipday')"
          >
            <span class="icon"></span> تحديث طلبات
            Shipday
          </button>
          <button
            class="btn"
            onclick="run('opDistributeSweep','توزيع Sweep')"
          >
            <span class="icon"></span> توزيع Sweep
          </button>
          <button
            class="btn"
            onclick="run('opDistributeToMain','توزيع إلى Main')"
          >
            <span class="icon"></span> توزيع إلى Main
          </button>
          <button
            class="btn full"
            onclick="run('opFillMissingIds','تعبئة OrderIds')"
          >
            <span class="icon"></span> تعبئة OrderIds
            الناقصة
          </button>
        </div>
      </div>

      <!-- Triggers -->
      <div class="section">
        <div class="section-title">
          <span></span> التريقرات
        </div>
        <div class="btn-grid">
          <button
            class="btn outline"
            onclick="run('opSetupTrigger','إنشاء Trigger')"
          >
            <span class="icon"></span> إنشاء Trigger /
            5 د
          </button>
          <button
            class="btn danger"
            onclick="run('opDeleteTriggers','حذف Triggers')"
          >
            <span class="icon">🗑</span> حذف Triggers
          </button>
          <button
            class="btn outline full"
            onclick="loadTriggers()"
          >
            <span class="icon"></span> عرض التريقرات
            الحالية
          </button>
        </div>
        <div class="trigger-list" id="triggerList"></div>
      </div>

      <!-- Logs -->
      <div class="section">
        <div class="section-title">
          <span></span> سجل آخر العمليات
        </div>
        <div class="logs-wrapper" id="logsWrap">
          <p
            style="
              color: var(--muted);
              text-align: center;
              font-size: 13px;
            "
          >
            جارٍ التحميل...
          </p>
        </div>
        <div class="logs-actions">
          <button class="btn outline" onclick="loadLogs()">
            تحديث السجل
          </button>
          <button
            class="btn danger"
            onclick="doClearLogs()"
          >
            مسح السجل
          </button>
        </div>
      </div>
    </div>

    <script>
      function $(id) {
        return document.getElementById(id);
      }

      function showOverlay(msg) {
        $('overlayText').textContent = msg || 'جارٍ التنفيذ...';
        $('overlay').classList.add('show');
      }

      function hideOverlay() {
        $('overlay').classList.remove('show');
      }

      var _toastTimer = null;
      function toast(msg, type) {
        var el = $('toast');
        el.textContent = msg;
        el.className = 'toast ' + (type || 'success');
        clearTimeout(_toastTimer);
        requestAnimationFrame(function () {
          el.classList.add('show');
        });
        _toastTimer = setTimeout(function () {
          el.classList.remove('show');
        }, 3500);
      }

      function disableButtons(state) {
        var btns = document.querySelectorAll('.btn');
        for (var i = 0; i < btns.length; i++) {
          btns[i].disabled = state;
        }
      }

      function run(fnName, label) {
        showOverlay(label + '...');
        disableButtons(true);
        google.script.run
          .withSuccessHandler(function (r) {
            hideOverlay();
            disableButtons(false);
            if (r && r.ok) {
              toast(
                label + ' ✅ (' + r.duration + ' ث)',
                'success'
              );
            } else {
              toast(
                (r && r.message) || 'خطأ غير معروف',
                'error'
              );
            }
            loadStats();
            loadLogs();
            if (
              fnName === 'opDistributeSweep' ||
              fnName === 'opDistributeToMain'
            ) {
              loadDistTable();
            }
          })
          .withFailureHandler(function (e) {
            hideOverlay();
            disableButtons(false);
            toast(e.message || 'خطأ في الاتصال', 'error');
          })
          [fnName]();
      }

      function loadStats() {
        google.script.run
          .withSuccessHandler(function (r) {
            if (r && r.ok) {
              $('statSent').textContent = r.sentToCourier;
              $('statOrderId').textContent = r.withOrderId;
              $('statTotal').textContent = r.totalRows;
              $('statTime').textContent = r.now;
            }
          })
          .getStats();
      }

      function loadDistTable() {
        google.script.run
          .withSuccessHandler(function (r) {
            var wrap = $('distTableWrap');
            if (!r || !r.ok) {
              wrap.innerHTML =
                '<p style="color:var(--err);text-align:center;font-size:13px">' +
                ((r && r.message) || 'خطأ في تحميل الجدول') +
                '</p>';
              return;
            }
            if (!r.headers || r.headers.length === 0) {
              wrap.innerHTML =
                '<p style="color:var(--muted);text-align:center;font-size:13px">لا توجد بيانات</p>';
              return;
            }
            var html = '<table class="dist-table"><thead><tr>';
            for (var h = 0; h < r.headers.length; h++) {
              html +=
                '<th>' + esc(String(r.headers[h])) + '</th>';
            }
            html += '</tr></thead><tbody>';
            for (var i = 0; i < r.rows.length; i++) {
              html += '<tr>';
              for (var j = 0; j < r.rows[i].length; j++) {
                html +=
                  '<td>' +
                  esc(String(r.rows[i][j])) +
                  '</td>';
              }
              html += '</tr>';
            }
            html += '</tbody></table>';
            wrap.innerHTML = html;
          })
          .withFailureHandler(function (e) {
            $('distTableWrap').innerHTML =
              '<p style="color:var(--err);text-align:center;font-size:13px">' +
              esc(e.message) +
              '</p>';
          })
          .getDistributionTable();
      }

      function loadLogs() {
        google.script.run
          .withSuccessHandler(function (r) {
            var wrap = $('logsWrap');
            if (!r || !r.ok || !r.logs || r.logs.length === 0) {
              wrap.innerHTML =
                '<p style="color:var(--muted);text-align:center;font-size:13px">لا توجد سجلات بعد</p>';
              return;
            }
            var html = '';
            for (var i = 0; i < r.logs.length; i++) {
              var lg = r.logs[i];
              var cls = lg.status === 'OK' ? 'ok' : 'err';
              html += '<div class="log-row">';
              html +=
                '<div class="log-dot ' + cls + '"></div>';
              html += '<div class="log-info">';
              html +=
                '<strong>' + esc(lg.task) + '</strong>';
              html +=
                '<span class="details">' +
                esc(lg.details) +
                '</span>';
              html += '</div>';
              html += '<div class="log-meta">';
              html += esc(lg.timestamp);
              html +=
                '<br>' + (lg.duration || '0') + ' ث';
              html += '</div>';
              html += '</div>';
            }
            wrap.innerHTML = html;
          })
          .withFailureHandler(function () {
            $('logsWrap').innerHTML =
              '<p style="color:var(--err);text-align:center;font-size:13px">خطأ في تحميل السجلات</p>';
          })
          .getRecentLogs(12);
      }

      function loadTriggers() {
        var list = $('triggerList');
        list.classList.add('show');
        list.innerHTML =
          '<p style="color:var(--muted);text-align:center">جارٍ التحميل...</p>';
        google.script.run
          .withSuccessHandler(function (r) {
            if (
              !r ||
              !r.ok ||
              !r.triggers ||
              r.triggers.length === 0
            ) {
              list.innerHTML =
                '<div class="trigger-empty">لا توجد تريقرات حالياً</div>';
              return;
            }
            var html = '';
            for (var i = 0; i < r.triggers.length; i++) {
              var t = r.triggers[i];
              html += '<div class="trigger-item">';
              html +=
                '<span>' + esc(t.handler) + '</span>';
              html +=
                '<span style="color:var(--muted)">' +
                esc(t.type) +
                '</span>';
              html += '</div>';
            }
            list.innerHTML = html;
          })
          .withFailureHandler(function (e) {
            list.innerHTML =
              '<div class="trigger-empty" style="color:var(--err)">' +
              esc(e.message) +
              '</div>';
          })
          .opListTriggers();
      }

      function doClearLogs() {
        if (!confirm('هل تريد مسح جميع السجلات؟')) return;
        showOverlay('مسح السجل...');
        google.script.run
          .withSuccessHandler(function (r) {
            hideOverlay();
            if (r && r.ok) {
              toast('تم مسح السجل ', 'success');
              loadLogs();
            } else {
              toast(
                (r && r.message) || 'خطأ',
                'error'
              );
            }
          })
          .withFailureHandler(function (e) {
            hideOverlay();
            toast(e.message, 'error');
          })
          .clearLogs();
      }

      function esc(s) {
        if (s === null || s === undefined) return '';
        var d = document.createElement('div');
        d.appendChild(document.createTextNode(String(s)));
        return d.innerHTML;
      }

      loadStats();
      loadDistTable();
      loadLogs();
    </script>
  </body>
</html>
