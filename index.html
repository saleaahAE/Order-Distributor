<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>سلعة — لوحة العمليات</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
  <style>
    /* ── TOKENS ─────────────────────────────────────────────── */
    :root {
      --brand:       #745ff2;
      --brand-2:     #a593f7;
      --brand-light: rgba(116,95,242,0.14);
      --brand-dark:  #5a45d6;
      --ok:          #10b981;
      --err:         #f43f5e;
      --warn:        #f59e0b;
      --bg:          #0c0b14;
      --surface:     #13111e;
      --card:        #181625;
      --card-2:      #1e1b2e;
      --border:      rgba(116,95,242,0.16);
      --border-2:    rgba(255,255,255,0.06);
      --text:        #e4e1f0;
      --muted:       #6e6b80;
      --radius:      14px;
      --radius-sm:   9px;
      --glow:        0 0 32px rgba(116,95,242,0.2);
      --shadow:      0 8px 32px rgba(0,0,0,0.5);
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

    body {
      font-family:'Cairo',sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      direction:rtl;
      line-height:1.6;
      overflow-x:hidden;
    }
    /* grid bg */
    body::before {
      content:'';position:fixed;inset:0;
      background-image:
        linear-gradient(rgba(116,95,242,.035) 1px,transparent 1px),
        linear-gradient(90deg,rgba(116,95,242,.035) 1px,transparent 1px);
      background-size:44px 44px;
      pointer-events:none;z-index:0;
    }
    /* top glow */
    body::after {
      content:'';position:fixed;top:-180px;left:50%;transform:translateX(-50%);
      width:800px;height:500px;
      background:radial-gradient(ellipse,rgba(116,95,242,.15) 0%,transparent 68%);
      pointer-events:none;z-index:0;
    }

    /* ── LAYOUT ──────────────────────────────────────────────── */
    .wrapper {
      position:relative;z-index:1;
      max-width:1080px;margin:0 auto;
      padding:36px 20px 100px;
    }

    /* ── HEADER ──────────────────────────────────────────────── */
    .header {
      text-align:center;margin-bottom:36px;
      animation:slideDown .55s cubic-bezier(.16,1,.3,1) both;
    }
    .logo-ring {
      display:inline-flex;align-items:center;justify-content:center;
      width:68px;height:68px;border-radius:18px;
      background:linear-gradient(135deg,var(--brand),var(--brand-dark));
      box-shadow:var(--glow);margin-bottom:12px;font-size:30px;
    }
    .header h1 {
      font-size:34px;font-weight:900;letter-spacing:-1px;
      background:linear-gradient(90deg,#fff 10%,var(--brand-2) 90%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;
    }
    .header p{font-size:13px;color:var(--muted);margin-top:2px}

    /* ── STATS ───────────────────────────────────────────────── */
    .stats-grid {
      display:grid;grid-template-columns:repeat(4,1fr);gap:12px;
      margin-bottom:20px;
      animation:slideUp .6s cubic-bezier(.16,1,.3,1) both;animation-delay:.08s;
    }
    .stat-card {
      background:var(--card);border:1px solid var(--border);
      border-radius:var(--radius);padding:18px 14px;text-align:center;
      position:relative;overflow:hidden;
      transition:transform .2s,box-shadow .2s;
    }
    .stat-card::before {
      content:'';position:absolute;top:0;left:0;right:0;height:2px;
      background:linear-gradient(90deg,var(--brand),var(--brand-2));
    }
    .stat-card:hover{transform:translateY(-2px);box-shadow:var(--glow)}
    .stat-card .num {
      font-size:30px;font-weight:900;line-height:1;
      background:linear-gradient(135deg,#fff,var(--brand-2));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;
    }
    .stat-card .lbl{font-size:11px;color:var(--muted);margin-top:5px;font-weight:700}
    .stat-card.time .num{font-size:12px;background:none;-webkit-text-fill-color:var(--text)}
    .stat-card.time::before{background:var(--muted)}

    /* ── SECTION ─────────────────────────────────────────────── */
    .section {
      background:var(--card);border:1px solid var(--border);
      border-radius:var(--radius);padding:22px;margin-bottom:16px;
      animation:slideUp .6s cubic-bezier(.16,1,.3,1) both;
    }
    .section-title {
      font-size:13px;font-weight:800;color:var(--brand-2);
      margin-bottom:16px;display:flex;align-items:center;gap:8px;
      letter-spacing:.3px;text-transform:uppercase;
    }

    /* ── BUTTONS ─────────────────────────────────────────────── */
    .btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .btn {
      display:flex;align-items:center;justify-content:center;gap:7px;
      padding:12px 14px;border:none;border-radius:var(--radius-sm);
      font-family:'Cairo',sans-serif;font-weight:700;font-size:13px;
      cursor:pointer;transition:all .2s;
      background:linear-gradient(135deg,var(--brand),var(--brand-dark));
      color:#fff;position:relative;overflow:hidden;
    }
    .btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0);transition:.2s}
    .btn:hover::after{background:rgba(255,255,255,.08)}
    .btn:hover{transform:translateY(-2px);box-shadow:0 6px 22px rgba(116,95,242,.38)}
    .btn:active{transform:scale(.97)}
    .btn:disabled{opacity:.38;cursor:not-allowed;transform:none;box-shadow:none}
    .btn.outline{background:transparent;border:1.5px solid var(--brand);color:var(--brand-2)}
    .btn.outline:hover{background:rgba(116,95,242,.1);box-shadow:0 4px 18px rgba(116,95,242,.2)}
    .btn.danger{background:linear-gradient(135deg,#f43f5e,#e11d48)}
    .btn.danger:hover{box-shadow:0 6px 22px rgba(244,63,94,.38)}
    .btn.teal{background:linear-gradient(135deg,#0ea5e9,#0284c7)}
    .btn.teal:hover{box-shadow:0 6px 22px rgba(14,165,233,.38)}
    .btn.green{background:linear-gradient(135deg,#10b981,#059669)}
    .btn.green:hover{box-shadow:0 6px 22px rgba(16,185,129,.38)}
    .btn.full{grid-column:1/-1}
    .btn .icon{font-size:15px}

    .divider{height:1px;background:var(--border-2);margin:16px 0}

    /* ── LOGS ─────────────────────────────────────────────────── */
    .logs-wrap{max-height:300px;overflow-y:auto;margin-top:4px}
    .logs-wrap::-webkit-scrollbar{width:3px}
    .logs-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
    .log-row {
      display:grid;grid-template-columns:20px 1fr auto;
      gap:10px;align-items:start;padding:9px 6px;
      border-bottom:1px solid rgba(255,255,255,.03);border-radius:6px;
      transition:background .15s;
    }
    .log-row:hover{background:rgba(116,95,242,.06)}
    .log-row:last-child{border-bottom:none}
    .dot{width:8px;height:8px;border-radius:50%;margin-top:6px;justify-self:center}
    .dot.ok {background:var(--ok);box-shadow:0 0 6px var(--ok)}
    .dot.err{background:var(--err);box-shadow:0 0 6px var(--err)}
    .log-info strong{font-size:12px;font-weight:700}
    .log-info .det{color:var(--muted);font-size:11px;display:block}
    .log-meta{text-align:left;color:var(--muted);font-size:10px;line-height:1.7}
    .dur-badge{
      display:inline-block;background:rgba(116,95,242,.18);color:var(--brand-2);
      border-radius:4px;padding:0 5px;font-size:10px;font-weight:700;
    }

    /* ── TRIGGERS ────────────────────────────────────────────── */
    .trig-list{
      margin-top:10px;font-size:12px;background:var(--surface);
      border:1px solid var(--border);border-radius:var(--radius-sm);
      padding:10px 14px;max-height:150px;overflow-y:auto;display:none;
    }
    .trig-list.show{display:block}
    .trig-row{display:flex;justify-content:space-between;align-items:center;
      padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04)}
    .trig-row:last-child{border-bottom:none}
    .trig-badge{
      font-size:10px;background:rgba(116,95,242,.2);color:var(--brand-2);
      padding:2px 8px;border-radius:20px;font-weight:700;
    }

    /* ── KANBAN ──────────────────────────────────────────────── */
    /*  The star of the show                                     */
    .kanban-section {
      background:var(--card);border:1px solid var(--border);
      border-radius:var(--radius);padding:22px;margin-bottom:16px;
      animation:slideUp .6s cubic-bezier(.16,1,.3,1) both;animation-delay:.18s;
    }
    .kanban-header {
      display:flex;align-items:center;justify-content:space-between;
      margin-bottom:18px;flex-wrap:wrap;gap:10px;
    }
    .kanban-title{font-size:13px;font-weight:800;color:var(--brand-2);
      display:flex;align-items:center;gap:8px;letter-spacing:.3px;text-transform:uppercase}

    /* unsaved pill */
    .unsaved-pill {
      display:none;align-items:center;gap:6px;
      background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.3);
      border-radius:20px;padding:4px 12px;
      font-size:11px;font-weight:700;color:var(--warn);
    }
    .unsaved-pill.show{display:flex}
    .unsaved-dot{width:6px;height:6px;border-radius:50%;background:var(--warn);
      box-shadow:0 0 6px var(--warn);animation:blink 1.2s ease-in-out infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

    .kanban-actions{display:flex;gap:8px;flex-wrap:wrap}
    .kanban-actions .btn{font-size:12px;padding:9px 16px}

    /* board scroll container */
    .board-scroll{
      overflow-x:auto;
      padding-bottom:8px;
      /* custom scrollbar */
    }
    .board-scroll::-webkit-scrollbar{height:5px}
    .board-scroll::-webkit-scrollbar-track{background:var(--surface);border-radius:4px}
    .board-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

    .board {
      display:flex;gap:12px;
      min-height:300px;
      /* columns don't shrink below 180px */
    }

    /* ── DRIVER COLUMN ───────────────────────────────────────── */
    .driver-col {
      flex:0 0 200px;
      background:var(--surface);
      border:1px solid var(--border-2);
      border-radius:12px;
      display:flex;flex-direction:column;
      transition:border-color .2s,box-shadow .2s;
      min-height:200px;
    }
    .driver-col.drag-over {
      border-color:var(--brand);
      box-shadow:0 0 0 2px rgba(116,95,242,.25), var(--glow);
    }

    .col-header {
      padding:12px 12px 10px;
      border-bottom:1px solid var(--border-2);
      position:sticky;top:0;z-index:2;
      background:var(--surface);
      border-radius:12px 12px 0 0;
    }
    .col-name {
      font-size:12px;font-weight:800;color:var(--text);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .col-meta {
      display:flex;gap:6px;align-items:center;margin-top:4px;
    }
    .col-count {
      font-size:10px;font-weight:700;
      background:var(--brand-light);color:var(--brand-2);
      border-radius:20px;padding:1px 8px;
    }

    /* card list drop zone */
    .card-list {
      flex:1;padding:8px;
      display:flex;flex-direction:column;gap:6px;
      min-height:80px;
    }

    /* ── ORDER CARD ──────────────────────────────────────────── */
    .order-card {
      background:var(--card);
      border:1px solid var(--border-2);
      border-radius:8px;
      padding:9px 10px;
      font-size:12px;font-weight:600;
      cursor:grab;
      display:flex;align-items:center;gap:8px;
      transition:transform .15s,box-shadow .15s,opacity .15s,border-color .15s;
      user-select:none;
      position:relative;
    }
    .order-card:hover {
      border-color:var(--brand);
      transform:translateY(-1px);
      box-shadow:0 4px 14px rgba(0,0,0,.35);
    }
    .order-card.dragging {
      opacity:.35;
      cursor:grabbing;
    }
    .card-handle {
      color:var(--muted);font-size:14px;flex-shrink:0;
      line-height:1;
    }
    .card-name{flex:1;color:var(--text);line-height:1.3}

    /* drop placeholder shown inside list while dragging */
    .drop-ghost {
      height:36px;
      border:1.5px dashed var(--brand);
      border-radius:8px;
      background:rgba(116,95,242,.06);
      flex-shrink:0;
    }

    /* empty column message */
    .col-empty {
      text-align:center;padding:20px 8px;
      color:var(--muted);font-size:11px;
      pointer-events:none;
    }

    /* board loading/empty states */
    .board-placeholder {
      width:100%;display:flex;align-items:center;justify-content:center;
      min-height:180px;
    }
    .bp-inner{text-align:center;color:var(--muted)}
    .bp-inner .bp-icon{font-size:32px;opacity:.4;margin-bottom:8px}
    .bp-inner p{font-size:13px}

    /* ── OVERLAY ─────────────────────────────────────────────── */
    .overlay {
      display:none;position:fixed;inset:0;
      background:rgba(12,11,20,.8);backdrop-filter:blur(8px);
      z-index:999;align-items:center;justify-content:center;
      flex-direction:column;gap:16px;
    }
    .overlay.show{display:flex}
    .spinner{
      width:50px;height:50px;border-radius:50%;
      border:3px solid rgba(116,95,242,.2);
      border-top-color:var(--brand);
      animation:spin .7s linear infinite;
    }
    .overlay-text{font-size:15px;font-weight:700;color:var(--brand-2)}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── TOAST ───────────────────────────────────────────────── */
    .toast {
      position:fixed;bottom:28px;left:50%;
      transform:translateX(-50%) translateY(80px);
      padding:11px 26px;border-radius:50px;color:#fff;
      font-family:'Cairo',sans-serif;font-weight:700;font-size:13px;
      z-index:1000;transition:transform .35s cubic-bezier(.16,1,.3,1),opacity .35s;
      opacity:0;pointer-events:none;white-space:nowrap;box-shadow:var(--shadow);
    }
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
    .toast.success{background:linear-gradient(90deg,#059669,#10b981)}
    .toast.error  {background:linear-gradient(90deg,#e11d48,#f43f5e)}

    /* ── EMPTY STATE ─────────────────────────────────────────── */
    .empty{text-align:center;padding:22px;color:var(--muted);font-size:13px}
    .empty .ei{font-size:26px;opacity:.4;margin-bottom:6px}

    /* ── ANIMATIONS ──────────────────────────────────────────── */
    @keyframes slideDown{from{opacity:0;transform:translateY(-18px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideUp  {from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)}}
    @keyframes pulse    {0%,100%{opacity:1}50%{opacity:.45}}
    .loading{animation:pulse 1.3s ease-in-out infinite}

    /* ── RESPONSIVE ──────────────────────────────────────────── */
    @media(max-width:600px){
      .stats-grid{grid-template-columns:1fr 1fr}
      .btn-grid{grid-template-columns:1fr}
      .header h1{font-size:26px}
      .driver-col{flex:0 0 160px}
    }
  </style>
</head>
<body>

<div class="overlay" id="overlay">
  <div class="spinner"></div>
  <div class="overlay-text" id="overlayText">جارٍ التنفيذ...</div>
</div>
<div class="toast" id="toast"></div>

<div class="wrapper">

  <!-- ── HEADER ─────────────────────────────────────────────── -->
  <div class="header">
    <div class="logo-ring">🐔</div>
    <h1>سلعة</h1>
    <p>موردك الأول في الدواجن — لوحة العمليات</p>
  </div>

  <!-- ── STATS ──────────────────────────────────────────────── -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="num loading" id="statSent">--</div>
      <div class="lbl">Sent to Courier</div>
    </div>
    <div class="stat-card">
      <div class="num loading" id="statOrderId">--</div>
      <div class="lbl">لديها Order ID</div>
    </div>
    <div class="stat-card">
      <div class="num loading" id="statTotal">--</div>
      <div class="lbl">إجمالي الصفوف</div>
    </div>
    <div class="stat-card time">
      <div class="num loading" id="statTime">--</div>
      <div class="lbl">آخر تحديث</div>
    </div>
  </div>

  <!-- ── OPERATIONS ─────────────────────────────────────────── -->
  <div class="section" style="animation-delay:.1s">
    <div class="section-title"><span>⚙️</span> عمليات Shipday</div>
    <div class="btn-grid">
      <button class="btn" onclick="run('opFetchUpload','رفع طلبات Shipday')">
        <span class="icon">📤</span> رفع طلبات Shipday
      </button>
      <button class="btn" onclick="run('opUpdateExisting','تحديث طلبات Shipday')">
        <span class="icon">🔄</span> تحديث طلبات Shipday
      </button>
      <button class="btn full" onclick="run('opFillMissingIds','تعبئة OrderIds')">
        <span class="icon">🔢</span> تعبئة OrderIds الناقصة
      </button>
    </div>

    <div class="divider"></div>

    <div class="section-title" style="margin-bottom:12px"><span>🧹</span> توزيع</div>
    <div class="btn-grid">
      <button class="btn teal" onclick="runSweep()">
        <span class="icon">🗺️</span> توزيع Sweep (يحمّل اللوحة)
      </button>
      <button class="btn green" onclick="runPushToMain()">
        <span class="icon">🚚</span> توزيع إلى Main (بدون تعديل)
      </button>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════
       KANBAN DRAG-AND-DROP BOARD
  ══════════════════════════════════════════════════════════ -->
  <div class="kanban-section">
    <div class="kanban-header">
      <div class="kanban-title">
        <span>🗂️</span> لوحة التوزيع اليدوي
        <div class="unsaved-pill" id="unsavedPill">
          <div class="unsaved-dot"></div>
          تعديلات غير محفوظة
        </div>
      </div>
      <div class="kanban-actions">
        <button class="btn outline" onclick="loadBoard()">
          <span class="icon">🔃</span> تحميل اللوحة
        </button>
        <button class="btn danger" id="resetBtn" onclick="resetBoard()" disabled>
          <span class="icon">↩️</span> تراجع
        </button>
        <button class="btn green" id="pushBtn" onclick="pushBoard()" disabled>
          <span class="icon">🚀</span> حفظ وإرسال إلى Main
        </button>
      </div>
    </div>

    <!-- Board -->
    <div class="board-scroll" id="boardScroll">
      <div class="board-placeholder" id="boardPlaceholder">
        <div class="bp-inner">
          <div class="bp-icon">🗂️</div>
          <p>اضغط "تحميل اللوحة" أو شغّل توزيع Sweep</p>
        </div>
      </div>
      <div class="board" id="board" style="display:none"></div>
    </div>
  </div>

  <!-- ── TRIGGERS ───────────────────────────────────────────── -->
  <div class="section" style="animation-delay:.22s">
    <div class="section-title"><span>⏱️</span> التريقرات</div>
    <div class="btn-grid">
      <button class="btn outline" onclick="run('opSetupTrigger','إنشاء Trigger')">
        <span class="icon">➕</span> إنشاء Trigger / 5 د
      </button>
      <button class="btn danger" onclick="run('opDeleteTriggers','حذف Triggers')">
        <span class="icon">🗑️</span> حذف Triggers
      </button>
      <button class="btn outline full" onclick="loadTriggers()">
        <span class="icon">👁️</span> عرض التريقرات
      </button>
    </div>
    <div class="trig-list" id="trigList"></div>
  </div>

  <!-- ── LOGS ───────────────────────────────────────────────── -->
  <div class="section" style="animation-delay:.28s">
    <div class="section-title"><span>📜</span> سجل العمليات</div>
    <div class="logs-wrap" id="logsWrap">
      <div class="empty"><div class="ei loading">📋</div><p>جارٍ التحميل...</p></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn outline" style="font-size:12px;padding:9px 16px" onclick="loadLogs()">🔃 تحديث</button>
      <button class="btn danger"  style="font-size:12px;padding:9px 16px" onclick="doClearLogs()">🗑️ مسح</button>
    </div>
  </div>

</div><!-- /wrapper -->

<script>
/* ═══════════════════════════════════════════════════════════
   CONFIG — paste your GAS web app URL here
═══════════════════════════════════════════════════════════ */
var GAS_URL = 'https://script.google.com/a/macros/saleaah.com/s/AKfycbxY40d8OKNa3TSBeu7mcyUSfZq3rD0kBFbTjLE_FgEaLnRppm7-tELvF94BnU2azdhq/exec';

/* ═══════════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════════ */
function $(id){ return document.getElementById(id); }

function showOverlay(msg){ $('overlayText').textContent=msg||'جارٍ التنفيذ...'; $('overlay').classList.add('show'); }
function hideOverlay(){ $('overlay').classList.remove('show'); }

var _tt=null;
function toast(msg,type){
  var el=$('toast'); el.textContent=msg;
  el.className='toast '+(type||'success');
  clearTimeout(_tt);
  requestAnimationFrame(function(){ el.classList.add('show'); });
  _tt=setTimeout(function(){ el.classList.remove('show'); },3800);
}

function disableBtns(s){ document.querySelectorAll('.btn').forEach(function(b){ b.disabled=s; }); }

function esc(s){
  if(s==null)return'';
  var d=document.createElement('div');
  d.appendChild(document.createTextNode(String(s)));
  return d.innerHTML;
}

function animateNum(id,target){
  var el=$(id); if(!el)return;
  el.classList.remove('loading');
  var n=parseInt(el.textContent)||0,t=parseInt(target)||0;
  if(isNaN(t)){el.textContent=target;return;}
  var step=Math.max(1,Math.ceil(Math.abs(t-n)/18)),dir=t>n?1:-1;
  var iv=setInterval(function(){
    n+=dir*step;
    if((dir>0&&n>=t)||(dir<0&&n<=t)){n=t;clearInterval(iv);}
    el.textContent=n;
  },28);
}

/* ═══════════════════════════════════════════════════════════
   JSONP — works from GitHub Pages without CORS issues
═══════════════════════════════════════════════════════════ */
function jsonp(action, params, cb){
  if(!GAS_URL||GAS_URL==='PASTE_YOUR_GAS_URL_HERE'){
    cb(null,new Error('GAS_URL غير مضبوط في الكود'));
    return;
  }
  var name='_gcb_'+Date.now()+'_'+Math.floor(Math.random()*1e7);
  var script=document.createElement('script');
  var timer;

  window[name]=function(r){
    clearTimeout(timer);
    cleanup();
    cb(r,null);
  };
  script.onerror=function(){
    clearTimeout(timer);
    cleanup();
    cb(null,new Error('فشل الاتصال بـ GAS'));
  };
  timer=setTimeout(function(){
    cleanup();
    cb(null,new Error('انتهت مهلة الطلب'));
  },90000);

  var qs='action='+encodeURIComponent(action)+'&callback='+encodeURIComponent(name);
  if(params){
    Object.keys(params).forEach(function(k){
      qs+='&'+encodeURIComponent(k)+'='+encodeURIComponent(params[k]);
    });
  }
  script.src=GAS_URL+'?'+qs;
  document.head.appendChild(script);

  function cleanup(){
    delete window[name];
    if(script.parentNode) script.parentNode.removeChild(script);
  }
}

/* ═══════════════════════════════════════════════════════════
   run() — generic op runner
═══════════════════════════════════════════════════════════ */
function run(fnName,label){
  showOverlay(label+'...');
  disableBtns(true);
  jsonp(fnName,null,function(r,err){
    hideOverlay(); disableBtns(false);
    if(err){ toast(err.message,'error'); return; }
    if(r&&r.ok){
      toast(label+' ✅  ('+r.duration+' ث)','success');
    } else {
      toast((r&&r.message)||'خطأ غير معروف','error');
    }
    loadStats(); loadLogs();
  });
}

/* ═══════════════════════════════════════════════════════════
   SWEEP — runs sweep then auto-loads the board
═══════════════════════════════════════════════════════════ */
function runSweep(){
  showOverlay('توزيع Sweep...');
  disableBtns(true);
  jsonp('opDistributeSweep',null,function(r,err){
    hideOverlay(); disableBtns(false);
    if(err){ toast(err.message,'error'); return; }
    if(r&&r.ok){
      toast('توزيع Sweep ✅  ('+r.duration+' ث) — يُحمَّل اللوحة...','success');
      setTimeout(loadBoard,500); // load board right after sweep
    } else {
      toast((r&&r.message)||'خطأ','error');
    }
    loadStats(); loadLogs();
  });
}

/* ═══════════════════════════════════════════════════════════
   STATS
═══════════════════════════════════════════════════════════ */
function loadStats(){
  jsonp('getStats',null,function(r,err){
    if(err||!r||!r.ok)return;
    animateNum('statSent',r.sentToCourier);
    animateNum('statOrderId',r.withOrderId);
    animateNum('statTotal',r.totalRows);
    $('statTime').textContent=r.now;
    $('statTime').classList.remove('loading');
  });
}

/* ═══════════════════════════════════════════════════════════
   LOGS
═══════════════════════════════════════════════════════════ */
function loadLogs(){
  jsonp('getRecentLogs',{n:16},function(r,err){
    var wrap=$('logsWrap');
    if(err||!r||!r.ok||!r.logs||!r.logs.length){
      wrap.innerHTML='<div class="empty"><div class="ei">📭</div><p>لا توجد سجلات</p></div>';
      return;
    }
    var html='';
    r.logs.forEach(function(lg){
      var cls=lg.status==='OK'?'ok':'err';
      html+='<div class="log-row">'
          +'<div class="dot '+cls+'"></div>'
          +'<div class="log-info"><strong>'+esc(lg.task)+'</strong>'
          +'<span class="det">'+esc(lg.details)+'</span></div>'
          +'<div class="log-meta">'+esc(lg.timestamp)
          +'<br><span class="dur-badge">'+esc(lg.duration||'0')+' ث</span></div>'
          +'</div>';
    });
    wrap.innerHTML=html;
  });
}

/* ═══════════════════════════════════════════════════════════
   TRIGGERS
═══════════════════════════════════════════════════════════ */
function loadTriggers(){
  var list=$('trigList');
  list.classList.add('show');
  list.innerHTML='<p style="text-align:center;color:var(--muted);padding:8px;font-size:12px" class="loading">جارٍ التحميل...</p>';
  jsonp('opListTriggers',null,function(r,err){
    if(err||!r||!r.ok||!r.triggers||!r.triggers.length){
      list.innerHTML='<div style="text-align:center;color:var(--muted);padding:8px;font-size:12px">لا توجد تريقرات</div>';
      return;
    }
    var html='';
    r.triggers.forEach(function(t){
      html+='<div class="trig-row"><span style="font-size:12px">'+esc(t.handler)+'</span>'

/* ═══════════════════════════════════════════════════════════
   CLEAR LOGS
═══════════════════════════════════════════════════════════ */
function doClearLogs(){
  if(!confirm('هل تريد مسح جميع السجلات؟'))return;
  showOverlay('مسح السجل...');
  jsonp('clearLogs',null,function(r,err){
    hideOverlay();
    if(err){toast(err.message,'error');return;}
    if(r&&r.ok){toast('تم مسح السجل ✅','success');loadLogs();}
    else toast((r&&r.message)||'خطأ','error');

/* ═══════════════════════════════════════════════════════════
   ████  KANBAN BOARD  ████
═══════════════════════════════════════════════════════════ */

/* Board state — source of truth */
var _boardOriginal = null;   // what was loaded from sheet (for reset)
var _boardState    = null;   // current state after user edits
var _dirty         = false;

/* ── Load board from GAS ── */
function loadBoard(){
  $('boardPlaceholder').style.display='flex';
  $('board').style.display='none';
  $('boardPlaceholder').querySelector('.bp-inner').innerHTML=
    '<div class="bp-icon loading">🗂️</div><p>جارٍ تحميل اللوحة...</p>';

  jsonp('getDistributionBoard',null,function(r,err){
    if(err||!r||!r.ok){
      $('boardPlaceholder').querySelector('.bp-inner').innerHTML=
        '<div class="bp-icon">⚠️</div><p>'+(err?esc(err.message):esc(r&&r.message||'خطأ'))+'</p>';
      return;
    }
    if(!r.headers||!r.headers.length){
      $('boardPlaceholder').querySelector('.bp-inner').innerHTML=
        '<div class="bp-icon">📭</div><p>لا توجد بيانات توزيع. شغّل توزيع Sweep أولاً.</p>';
      return;
    }
    // Deep-copy to original
    _boardOriginal = deepCopy(r);
    _boardState    = deepCopy(r);
    _dirty=false;
    renderBoard(_boardState);
    setUnsaved(false);
  });
}

/* ── Render board from state object ── */
function renderBoard(state){
  var board=$('board');
  board.innerHTML='';

  state.headers.forEach(function(header,ci){
    var col=makeColumn(header, state.columns[ci], ci);
    board.appendChild(col);
  });

  $('boardPlaceholder').style.display='none';
  board.style.display='flex';
  $('pushBtn').disabled=false;
  $('resetBtn').disabled=false;
}

/* ── Build one driver column DOM element ── */
function makeColumn(header, orders, colIndex){
  var col=document.createElement('div');
  col.className='driver-col';
  col.dataset.col=colIndex;

  /* header */
  var hd=document.createElement('div');
  hd.className='col-header';
  hd.innerHTML='<div class="col-name">'+esc(header)+'</div>'
              +'<div class="col-meta"><span class="col-count" id="cnt-'+colIndex+'">'+orders.length+'</span></div>';
  col.appendChild(hd);

  /* card list */
  var list=document.createElement('div');
  list.className='card-list';
  list.dataset.col=colIndex;

  if(orders.length===0){
    list.innerHTML='<div class="col-empty">فارغ — اسحب هنا</div>';
  } else {
    orders.forEach(function(name){
      list.appendChild(makeCard(name));
    });
  }

  /* drop zone events */
  list.addEventListener('dragover',  onDragOver);
  list.addEventListener('dragleave', onDragLeave);
  list.addEventListener('drop',      onDrop);

  col.appendChild(list);
  return col;
}

/* ── Build one order card DOM element ── */
function makeCard(name){
  var card=document.createElement('div');
  card.className='order-card';
  card.draggable=true;
  card.dataset.name=name;
  card.innerHTML='<span class="card-handle">⠿</span>'
                +'<span class="card-name">'+esc(name)+'</span>';

  card.addEventListener('dragstart', onDragStart);
  card.addEventListener('dragend',   onDragEnd);
  return card;
}

/* ═══════════════════════════════════════════════════════════
   DRAG & DROP — HTML5 API
═══════════════════════════════════════════════════════════ */
var _dragging=null;       // the card element being dragged
var _fromCol=null;        // source column index (string)
var _ghost=null;          // placeholder shown in target list

function onDragStart(e){
  _dragging=this;
  _fromCol=this.closest('.card-list').dataset.col;
  this.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain', this.dataset.name);
}

function onDragEnd(){
  if(_dragging) _dragging.classList.remove('dragging');
  _dragging=null; _fromCol=null;
  removeGhost();
  /* clean up all drag-over highlights */
  document.querySelectorAll('.driver-col.drag-over').forEach(function(c){
    c.classList.remove('drag-over');
  });
}

function onDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  var list=this;
  list.closest('.driver-col').classList.add('drag-over');

  /* show ghost placeholder near cursor */
  removeGhost();
  _ghost=document.createElement('div');
  _ghost.className='drop-ghost';

  /* figure out insertion point */
  var afterEl=getDragAfterEl(list, e.clientY);
  if(afterEl){
    list.insertBefore(_ghost,afterEl);
  } else {
    list.appendChild(_ghost);
  }
}

function onDragLeave(e){
  /* only fire when actually leaving the list, not entering a child */
  if(!this.contains(e.relatedTarget)){
    this.closest('.driver-col').classList.remove('drag-over');
    removeGhost();
  }
}

function onDrop(e){
  e.preventDefault();
  removeGhost();
  var targetList=this;
  var toCol=targetList.dataset.col;
  targetList.closest('.driver-col').classList.remove('drag-over');

  if(!_dragging)return;
  var name=_dragging.dataset.name;
  var fromCol=_fromCol;

  if(fromCol===toCol){
    /* reorder within same column */
    var afterEl=getDragAfterEl(targetList,e.clientY);
    if(afterEl){
      targetList.insertBefore(_dragging,afterEl);
    } else {
      targetList.appendChild(_dragging);
    }
    syncStateFromDOM();
    return;
  }

  /* move across columns */
  var afterEl=getDragAfterEl(targetList,e.clientY);

  /* remove empty-col message if present */
  var emptyMsg=targetList.querySelector('.col-empty');
  if(emptyMsg) emptyMsg.remove();

  if(afterEl){
    targetList.insertBefore(_dragging,afterEl);
  } else {
    targetList.appendChild(_dragging);
  }

  /* if source col now empty, add message */
  var sourceList=document.querySelector('.card-list[data-col="'+fromCol+'"]');
  var remainingCards=sourceList.querySelectorAll('.order-card');
  if(remainingCards.length===0){
    var msg=document.createElement('div');
    msg.className='col-empty';
    msg.textContent='فارغ — اسحب هنا';
    sourceList.appendChild(msg);
  }

  syncStateFromDOM();
}

/* find the card element that the cursor is above */
function getDragAfterEl(container, y){
  var cards=Array.from(container.querySelectorAll('.order-card:not(.dragging)'));
  return cards.reduce(function(closest,child){
    var box=child.getBoundingClientRect();
    var offset=y-(box.top+box.height/2);
    if(offset<0&&offset>closest.offset){
      return{offset:offset,element:child};
    }
    return closest;
  },{offset:-Infinity,element:null}).element;
}

function removeGhost(){
  if(_ghost&&_ghost.parentNode){ _ghost.parentNode.removeChild(_ghost); }
  _ghost=null;
}

/* ═══════════════════════════════════════════════════════════
   Sync DOM → _boardState after any drop
═══════════════════════════════════════════════════════════ */
function syncStateFromDOM(){
  var board=$('board');
  var cols=board.querySelectorAll('.driver-col');
  cols.forEach(function(col,ci){
    var cards=col.querySelectorAll('.order-card');
    var names=[];
    cards.forEach(function(c){ names.push(c.dataset.name); });
    _boardState.columns[ci]=names;
    /* update count badge */
    var cnt=$('cnt-'+ci);
    if(cnt) cnt.textContent=names.length;
  });
  _dirty=true;
  setUnsaved(true);
}

function setUnsaved(v){
  $('unsavedPill').className='unsaved-pill'+(v?' show':'');
  $('pushBtn').disabled=!_boardState;
  $('resetBtn').disabled=!_boardState;
}

/* ═══════════════════════════════════════════════════════════
   Reset board to original loaded state
═══════════════════════════════════════════════════════════ */
function resetBoard(){
  if(!_boardOriginal)return;
  _boardState=deepCopy(_boardOriginal);
  _dirty=false;
  renderBoard(_boardState);
  setUnsaved(false);
  toast('تم التراجع إلى آخر حالة محفوظة ↩️','success');
}

/* ═══════════════════════════════════════════════════════════
   Push adjusted board → GAS → Distribution_Result → Main
═══════════════════════════════════════════════════════════ */
function pushBoard(){
  if(!_boardState||!_boardState.headers.length){
    toast('لا توجد بيانات للإرسال','error');
    return;
  }
  showOverlay('حفظ اللوحة وإرسالها إلى Main...');
  disableBtns(true);

  var payload=JSON.stringify({
    headers: _boardState.headers,
    columns: _boardState.columns
  });

  jsonp('opSaveAndPushToMain',{board:payload},function(r,err){
    hideOverlay(); disableBtns(false);
    if(err){ toast(err.message,'error'); return; }
    if(r&&r.ok){
      toast('اللوحة محفوظة وأُرسلت إلى Main ✅  ('+r.duration+' ث)','success');
      /* snapshot as new original */
      _boardOriginal=deepCopy(_boardState);
      _dirty=false;
      setUnsaved(false);
      $('pushBtn').disabled=false;
      $('resetBtn').disabled=false;
    } else {
      toast((r&&r.message)||'خطأ','error');
    }
    loadStats(); loadLogs();
  });
}

/* ═══════════════════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════════════════ */
function deepCopy(obj){ return JSON.parse(JSON.stringify(obj)); }

/* ═══════════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════════ */
loadStats();
loadLogs();
setInterval(function(){ loadStats(); loadLogs(); }, 90000);
</script>
