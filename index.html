<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Logistics Distributor</title>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0f1117;
    --surface: #1a1d27;
    --border:  #2a2d3e;
    --accent:  #4f8ef7;
    --danger:  #e05c5c;
    --warning: #f0a500;
    --success: #43c98e;
    --text:    #e8eaf0;
    --muted:   #7b7f96;
    --card-bg: #22263a;
    --radius:  12px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    min-height: 100vh;
  }

  /* ── Auth ── */
  #auth-screen {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; gap: 24px; padding: 32px;
  }
  #auth-screen h1 { font-size: 1.6rem; text-align: center; }
  #auth-screen p  { color: var(--muted); text-align: center; font-size: 0.9rem; }
  #auth-error     { color: var(--danger); font-size: 0.85rem; text-align: center; display: none; max-width: 320px; }

  /* ── App Shell ── */
  #app { display: none; flex-direction: column; min-height: 100vh; }

  /* ── Top Bar ── */
  #topbar {
    position: sticky; top: 0; z-index: 100;
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 12px 16px; display: flex; align-items: center; gap: 12px;
  }
  #topbar h2 { flex: 1; font-size: 1rem; }

  .btn {
    padding: 8px 16px; border-radius: 8px; border: none;
    font-size: 0.85rem; font-weight: 600;
    cursor: pointer; transition: opacity 0.15s;
  }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-primary  { background: var(--accent);  color: #fff; }
  .btn-success  { background: var(--success); color: #fff; }
  .btn-ghost    { background: transparent; color: var(--muted); border: 1px solid var(--border); }

  /* ── Status Bar ── */
  #statusbar {
    padding: 8px 16px; font-size: 0.78rem;
    color: var(--muted); background: var(--surface);
    border-bottom: 1px solid var(--border);
    min-height: 32px;
  }
  #statusbar span { color: var(--text); font-weight: 600; }

  /* ── Warning Banner ── */
  #warning-banner {
    display: none;
    background: rgba(240,165,0,0.12);
    border-bottom: 1px solid rgba(240,165,0,0.3);
    color: var(--warning);
    padding: 8px 16px; font-size: 0.82rem;
  }

  /* ── Board ── */
  #board {
    display: flex; gap: 12px; padding: 16px;
    overflow-x: auto; flex: 1; align-items: flex-start;
    -webkit-overflow-scrolling: touch;
  }

  /* ── Empty State ── */
  #empty-state {
    display: none;
    flex-direction: column; align-items: center;
    justify-content: center; gap: 12px;
    padding: 48px 32px; text-align: center;
    color: var(--muted); width: 100%;
  }
  #empty-state .icon { font-size: 2.5rem; }

  /* ── Driver Column ── */
  .driver-col {
    flex: 0 0 260px;
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    display: flex; flex-direction: column;
    max-height: calc(100vh - 170px);
  }
  .driver-col.unassigned-col { border: 2px dashed var(--border); }

  .driver-header {
    padding: 12px; border-bottom: 1px solid var(--border);
    background: var(--surface);
    border-radius: var(--radius) var(--radius) 0 0;
    position: sticky; top: 0; z-index: 10;
  }
  .driver-title {
    display: flex; align-items: center;
    justify-content: space-between; gap: 8px; margin-bottom: 8px;
  }
  .driver-count { font-size: 0.78rem; color: var(--muted); white-space: nowrap; }

  .driver-select {
    flex: 1; background: var(--card-bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 4px 8px; font-size: 0.88rem; font-weight: 700;
    cursor: pointer; max-width: 170px;
  }
  .driver-select:focus { outline: 1px solid var(--accent); }

  /* Capacity bar */
  .cap-bar-track {
    height: 6px; background: var(--border);
    border-radius: 99px; overflow: hidden;
  }
  .cap-bar-fill {
    height: 100%; border-radius: 99px; background: var(--success);
    transition: width 0.3s, background 0.3s;
  }
  .cap-label {
    display: flex; justify-content: space-between;
    font-size: 0.72rem; color: var(--muted); margin-top: 4px;
  }
  .cap-label .over { color: var(--danger); font-weight: 700; }

  .order-list { padding: 8px; overflow-y: auto; flex: 1; min-height: 60px; }

  /* ── Order Card ── */
  .order-card {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 12px; margin-bottom: 8px;
    cursor: grab; user-select: none;
    transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
  }
  .order-card:active           { transform: scale(0.97); }
  .order-card.sortable-ghost   { opacity: 0.35; }
  .order-card.sortable-chosen  { box-shadow: 0 4px 20px rgba(79,142,247,0.35); border-color: var(--accent); }

  .card-top {
    display: flex; align-items: flex-start;
    justify-content: space-between; gap: 8px; margin-bottom: 6px;
  }
  .card-name   { font-weight: 600; font-size: 0.88rem; line-height: 1.3; }
  .card-weight {
    flex-shrink: 0; background: rgba(79,142,247,0.15); color: var(--accent);
    border-radius: 6px; padding: 2px 7px;
    font-size: 0.75rem; font-weight: 700; white-space: nowrap;
  }
  .card-row {
    font-size: 0.75rem; color: var(--muted);
    display: flex; align-items: center; gap: 5px; margin-top: 3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-row strong { color: var(--text); }

  .badge { display: inline-block; border-radius: 5px; padding: 1px 6px; font-size: 0.68rem; font-weight: 700; }
  .badge-flex   { background: rgba(67,201,142,0.15); color: var(--success); }
  .badge-noflex { background: rgba(224,92,92,0.15);  color: var(--danger);  }

  /* ── Loading ── */
  #loading {
    display: none; position: fixed; inset: 0; z-index: 999;
    background: rgba(15,17,23,0.85);
    align-items: center; justify-content: center;
    flex-direction: column; gap: 16px;
  }
  #loading.show { display: flex; }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: var(--surface); border: 1px solid var(--border);
    padding: 10px 20px; border-radius: 99px; font-size: 0.85rem;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    transition: opacity 0.3s; opacity: 0; pointer-events: none; z-index: 998;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; }

  /* ── Bottom Bar ── */
  #action-bar {
    position: sticky; bottom: 0; z-index: 100;
    background: var(--surface); border-top: 1px solid var(--border);
    padding: 12px 16px; display: flex; gap: 10px;
  }
  #action-bar .btn { flex: 1; padding: 12px; font-size: 0.9rem; }
</style>
</head>
<body>

<!-- ── Auth Screen ── -->
<div id="auth-screen">
  <div style="font-size:2.5rem">🚛</div>
  <h1>Logistics Distributor</h1>
  <p>Sign in with your company Google account to continue.</p>
  <div id="g_id_onload"
    data-client_id="419979964042-afehenfab2n3irgl43ghh8npcf10u639.apps.googleusercontent.com"
    data-callback="onGoogleSignIn"
    data-auto_select="true">
  </div>
  <div class="g_id_signin"
    data-type="standard"
    data-theme="filled_black"
    data-text="signin_with"
    data-shape="pill"
    data-size="large">
  </div>
  <p id="auth-error"></p>
</div>

<!-- ── Main App ── -->
<div id="app">
  <div id="topbar">
    <h2>🚛 Distribution Board</h2>
    <button class="btn btn-ghost" onclick="logout()">Sign out</button>
  </div>
  <div id="warning-banner"></div>
  <div id="statusbar">Loading…</div>
  <div id="board">
    <div id="empty-state">
      <div class="icon">📋</div>
      <div>No driver columns found.<br>Check that columns J & K in your sheet have Vehicle_ID and Vehicle_Cap data.</div>
      <button class="btn btn-ghost" onclick="loadData()" style="margin-top:8px">🔄 Retry</button>
    </div>
  </div>
  <div id="action-bar">
    <button class="btn btn-primary" id="btn-distribute" onclick="runDistribute()">⚡ Auto-Distribute</button>
    <button class="btn btn-success"  id="btn-save"       onclick="saveAssignments()" disabled>✅ Confirm & Push</button>
  </div>
</div>

<div id="loading"><div class="spinner"></div><span id="loading-msg">Loading…</span></div>
<div id="toast"></div>

<script>
// ══════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════
const GAS_URL          = "https://script.google.com/macros/s/AKfycbyeBC6HgoO4zpPu_t2Ro5Cg7JOMkJyR14UjWfeMT5IN25mXC1txB4y1swCHnWaPXyke0w/exec";
const GOOGLE_CLIENT_ID = "419979964042-afehenfab2n3irgl43ghh8npcf10u639.apps.googleusercontent.com";
// ══════════════════════════════════════════════

let idToken   = null;
let drivers   = [];
let allOrders = [];
let board     = { unassigned: [] };

// ── Auth ──────────────────────────────────────

function onGoogleSignIn(response) {
  idToken = response.credential;
  document.getElementById("auth-screen").style.display = "none";
  document.getElementById("app").style.display        = "flex";
  loadData();
}

function logout() {
  google.accounts.id.disableAutoSelect();
  idToken = null;
  document.getElementById("app").style.display         = "none";
  document.getElementById("auth-screen").style.display = "flex";
}

// ── API ───────────────────────────────────────

async function api(method, body = {}) {
  try {
    if (method === "GET") {
      const res  = await fetch(`${GAS_URL}?idToken=${encodeURIComponent(idToken)}`);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      return data;
    }
    const res  = await fetch(GAS_URL, {
      method:  "POST",
      headers: { "Content-Type": "text/plain" },
      body:    JSON.stringify({ idToken, ...body })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    return data;
  } catch (e) {
    // Improve error message for common issues
    if (e.message.includes("Failed to fetch")) {
      throw new Error("Cannot reach the server. Check your GAS_URL and make sure the deployment is live.");
    }
    throw e;
  }
}

// ── Load data ─────────────────────────────────

async function loadData() {
  showLoading("Fetching orders…");
  hideWarning();

  try {
    const data = await api("GET");

    drivers   = data.drivers   || [];
    allOrders = data.orders    || [];

    // Show warning if server flagged something
    if (data.warning) showWarning("⚠ " + data.warning);

    // Reset board state
    board = { unassigned: [...allOrders] };
    drivers.forEach(d => { board[d.id] = []; });

    renderBoard();
    updateStatus();

  } catch (e) {
    showAuthError(e.message);
    setStatus("❌ Failed to load — " + e.message);
  } finally {
    hideLoading();
  }
}

// ── Auto-distribute ───────────────────────────

async function runDistribute() {
  if (drivers.length === 0) {
    toast("❌ No drivers loaded — check your sheet columns J & K");
    return;
  }
  showLoading("Running distribution algorithm…");
  document.getElementById("btn-distribute").disabled = true;

  try {
    const data = await api("POST", { action: "distribute" });
    applyResult(data.result || {});
    document.getElementById("btn-save").disabled = false;
    toast("✅ Distribution complete — adjust as needed");
  } catch (e) {
    toast("❌ " + e.message);
  } finally {
    hideLoading();
    document.getElementById("btn-distribute").disabled = false;
  }
}

function applyResult(result) {
  // Reset all columns
  drivers.forEach(d => { board[d.id] = []; });
  board.unassigned = [];

  // Index orders by every possible name key
  const byName = {};
  allOrders.forEach(o => {
    byName[o.estName] = o;
    (o.displayNames || []).forEach(n => {
      if (n) byName[n.trim()] = o;
    });
  });

  // Assign from result
  drivers.forEach(d => {
    (result[d.id] || []).forEach(name => {
      const order = byName[name.trim()];
      if (order && !board[d.id].find(x => x.id === order.id)) {
        board[d.id].push(order);
      }
    });
  });

  // Unmatched → unassigned
  const assignedIds = new Set(drivers.flatMap(d => board[d.id].map(o => o.id)));
  board.unassigned  = allOrders.filter(o => !assignedIds.has(o.id));

  renderBoard();
  updateStatus();
}

// ── Save / push ───────────────────────────────

async function saveAssignments() {
  showLoading("Checking capacity…");
  document.getElementById("btn-save").disabled = true;

  const assignments = {};
  drivers.forEach(d => {
    assignments[d.id] = board[d.id].map(o => o.estName);
  });

  try {
    const result = await api("POST", { action: "save", assignments });

    if (result.violations) {
      hideLoading();
      const msg = "⚠️ Capacity issues:\n\n"
        + result.violations.join("\n")
        + "\n\nPush to Main sheet anyway?";
      if (!confirm(msg)) {
        document.getElementById("btn-save").disabled = false;
        return;
      }
      showLoading("Pushing to Main sheet…");
      await api("POST", { action: "save", assignments, forceOverride: true });
    }

    toast("🎉 Main sheet updated successfully!");
  } catch (e) {
    toast("❌ " + e.message);
    document.getElementById("btn-save").disabled = false;
  } finally {
    hideLoading();
  }
}

// ── Render ────────────────────────────────────

function renderBoard() {
  const boardEl   = document.getElementById("board");
  const emptyEl   = document.getElementById("empty-state");
  boardEl.innerHTML = "";

  if (drivers.length === 0) {
    boardEl.appendChild(emptyEl);
    emptyEl.style.display = "flex";
    return;
  }

  emptyEl.style.display = "none";

  // Unassigned column
  boardEl.appendChild(buildColumn(null));

  // Driver columns
  drivers.forEach(d => boardEl.appendChild(buildColumn(d)));
}

function buildColumn(driver) {
  const isUnassigned = driver === null;
  const colId        = isUnassigned ? "unassigned" : driver.id;
  const orders       = board[colId] || [];

  const load = isUnassigned ? 0 : orders.reduce((s, o) => s + (o.weight || 0), 0);
  const cap  = isUnassigned ? 0 : driver.capacity;
  const pct  = cap > 0 ? Math.min(load / cap * 100, 100) : 0;
  const over = cap > 0 && load > cap;
  const fillColor = over ? "var(--danger)" : pct > 80 ? "var(--warning)" : "var(--success)";

  const col       = document.createElement("div");
  col.className   = "driver-col" + (isUnassigned ? " unassigned-col" : "");
  col.id          = "col-" + colId;

  const headerContent = isUnassigned
    ? `<span style="font-weight:700;color:var(--muted)">📦 Unassigned</span>`
    : `<select class="driver-select"
         data-col="${colId}"
         onchange="swapDriverColumns('${colId}', this.value)">
         ${drivers.map(d =>
           `<option value="${d.id}" ${d.id === colId ? "selected" : ""}>${d.id} (${d.capacity.toLocaleString()} kg)</option>`
         ).join("")}
       </select>`;

  col.innerHTML = `
    <div class="driver-header">
      <div class="driver-title">
        ${headerContent}
        <span class="driver-count" id="count-${colId}">${orders.length} orders</span>
      </div>
      ${!isUnassigned ? `
        <div class="cap-bar-track">
          <div class="cap-bar-fill" id="bar-${colId}"
               style="width:${pct}%; background:${fillColor}"></div>
        </div>
        <div class="cap-label">
          <span id="load-${colId}" class="${over ? "over" : ""}">
            ${over ? "⚠ " : ""}${load.toLocaleString()} kg
          </span>
          <span>${cap.toLocaleString()} kg</span>
        </div>
      ` : ""}
    </div>
    <div class="order-list" id="list-${colId}" data-col="${colId}"></div>
  `;

  const list = col.querySelector(`#list-${colId}`);
  orders.forEach(o => list.appendChild(buildCard(o)));

  Sortable.create(list, {
    group: "orders", animation: 150,
    ghostClass: "sortable-ghost", chosenClass: "sortable-chosen",
    onEnd(evt) {
      const fromCol = evt.from.dataset.col;
      const toCol   = evt.to.dataset.col;
      const orderId = evt.item.dataset.id;
      if (fromCol === toCol) return;

      const order = (board[fromCol] || []).find(o => String(o.id) === orderId);
      if (!order) return;

      board[fromCol] = board[fromCol].filter(o => String(o.id) !== orderId);
      if (!board[toCol]) board[toCol] = [];
      board[toCol].splice(evt.newIndex, 0, order);

      refreshColumnHeader(fromCol);
      refreshColumnHeader(toCol);
      updateStatus();
      document.getElementById("btn-save").disabled = false;
    }
  });

  return col;
}

function buildCard(order) {
  const card      = document.createElement("div");
  card.className  = "order-card";
  card.dataset.id = order.id;

  const flexBadge = order.flexible
    ? `<span class="badge badge-flex">Flexible</span>`
    : `<span class="badge badge-noflex">Fixed</span>`;

  card.innerHTML = `
    <div class="card-top">
      <span class="card-name">${order.estName || String(order.id)}</span>
      <span class="card-weight">${(order.weight || 0).toLocaleString()} kg</span>
    </div>
    <div class="card-row">📍 <strong>${order.neighborhood || order.location || "—"}</strong></div>
    <div class="card-row">🏷 ${order.brand || "—"} &nbsp;|&nbsp; #${order.id}</div>
    <div class="card-row">⏰ ${order.lastDelivery || "—"} &nbsp; ${flexBadge}</div>
  `;
  return card;
}

// ── Driver swap ───────────────────────────────

function swapDriverColumns(fromId, toId) {
  if (fromId === toId) return;
  const temp    = board[fromId] || [];
  board[fromId] = board[toId]   || [];
  board[toId]   = temp;
  renderBoard();
  updateStatus();
  document.getElementById("btn-save").disabled = false;
  toast(`↔ Swapped ${fromId} ↔ ${toId}`);
}

// ── Refresh single column header after drag ───

function refreshColumnHeader(colId) {
  const orders  = board[colId] || [];
  const countEl = document.getElementById("count-" + colId);
  if (countEl) countEl.textContent = orders.length + " orders";
  if (colId === "unassigned") return;

  const driver = drivers.find(d => d.id === colId);
  if (!driver) return;

  const load  = orders.reduce((s, o) => s + (o.weight || 0), 0);
  const pct   = Math.min(load / driver.capacity * 100, 100);
  const over  = load > driver.capacity;
  const color = over ? "var(--danger)" : pct > 80 ? "var(--warning)" : "var(--success)";

  const barEl  = document.getElementById("bar-"  + colId);
  const loadEl = document.getElementById("load-" + colId);
  if (barEl)  { barEl.style.width = pct + "%"; barEl.style.background = color; }
  if (loadEl) {
    loadEl.textContent = (over ? "⚠ " : "") + load.toLocaleString() + " kg";
    loadEl.className   = over ? "over" : "";
  }
}

// ── Status bar ────────────────────────────────

function updateStatus() {
  const total      = allOrders.length;
  const assigned   = drivers.reduce((s, d) => s + (board[d.id] || []).length, 0);
  const unassigned = (board.unassigned || []).length;
  const overloaded = drivers.filter(d => {
    const load = (board[d.id] || []).reduce((s, o) => s + (o.weight || 0), 0);
    return load > d.capacity;
  }).length;

  let html = `<span>${assigned}/${total}</span> orders assigned`;
  if (unassigned > 0) html += ` · <span style="color:var(--warning)">${unassigned} unassigned</span>`;
  if (overloaded > 0) html += ` · <span style="color:var(--danger)">⚠ ${overloaded} driver(s) over capacity</span>`;

  document.getElementById("statusbar").innerHTML = html;
}

function setStatus(msg) {
  document.getElementById("statusbar").textContent = msg;
}

// ── UI helpers ────────────────────────────────

function showLoading(msg = "Loading…") {
  document.getElementById("loading-msg").textContent = msg;
  document.getElementById("loading").classList.add("show");
}
function hideLoading()  { document.getElementById("loading").classList.remove("show"); }

function showWarning(msg) {
  const el = document.getElementById("warning-banner");
  el.textContent    = msg;
  el.style.display  = "block";
}
function hideWarning() {
  document.getElementById("warning-banner").style.display = "none";
}

function showAuthError(msg) {
  const el = document.getElementById("auth-error");
  el.textContent   = msg;
  el.style.display = "block";
}

function toast(msg, duration = 3500) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), duration);
}
</script>
</body>
</html>
