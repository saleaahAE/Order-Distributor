<!DOCTYPE html>
<html dir="rtl" lang="ar">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>سلعة — لوحة العمليات</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --brand: #745ff2;
        --brand-light: #ece9fe;
        --brand-dark: #5a45d6;
        --ok: #22c55e;
        --err: #ef4444;
        --bg: #f8f7fc;
        --card: #ffffff;
        --text: #1e1e2e;
        --muted: #71717a;
        --radius: 14px;
        --shadow: 0 2px 12px rgba(116, 95, 242, 0.08);
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: 'Cairo', sans-serif;
        font-weight: 400;
        background-color: var(--bg);
        color: var(--text);
        min-height: 100vh;
        position: relative;
        direction: rtl;
        line-height: 1.6;
      }
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image: url('PATTERN_URL_HERE');
        background-size: 180px 180px;
        opacity: 0.08;
        pointer-events: none;
        z-index: 0;
      }
      .wrapper {
        position: relative;
        z-index: 1;
        max-width: 900px;
        margin: 0 auto;
        padding: 24px 18px 60px;
        animation: fadeIn 0.5s ease;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .header { text-align: center; margin-bottom: 28px; }
      .header img { width: 80px; height: 80px; border-radius: 20px; object-fit: contain; margin-bottom: 8px; }
      .header h1 { font-size: 28px; font-weight: 700; color: var(--brand); margin: 0; line-height: 1.2; }
      .header p { font-size: 14px; color: var(--muted); font-weight: 400; margin-top: 2px; }
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 14px;
        margin-bottom: 24px;
      }
      .stat-card {
        background: var(--card);
        border-radius: var(--radius);
        padding: 18px 16px;
        box-shadow: var(--shadow);
        text-align: center;
        border-top: 3px solid var(--brand);
      }
      .stat-card .num { font-size: 30px; font-weight: 700; color: var(--brand); line-height: 1.1; }
      .stat-card .lbl { font-size: 12px; color: var(--muted); margin-top: 4px; font-weight: 600; }
      .stat-card.time-card { border-top-color: var(--muted); }
      .stat-card.time-card .num { font-size: 16px; color: var(--text); }
      .section {
        background: var(--card);
        border-radius: var(--radius);
        padding: 20px;
        box-shadow: var(--shadow);
        margin-bottom: 20px;
      }
      .section-title {
        font-size: 16px; font-weight: 700; color: var(--brand);
        margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
      }
      .section-title span { font-size: 20px; }
      .dist-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 8px; }
      .dist-table th {
        background: var(--brand); color: #fff; font-weight: 600;
        padding: 10px 8px; text-align: center;
      }
      .dist-table th:first-child { border-radius: 0 8px 0 0; }
      .dist-table th:last-child  { border-radius: 8px 0 0 0; }
      .dist-table td { padding: 9px 8px; text-align: center; border-bottom: 1px solid #f0eef8; }
      .dist-table tr:hover td { background: var(--brand-light); }
      .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
      .btn {
        display: flex; align-items: center; justify-content: center;
        gap: 6px; padding: 12px 10px; border: none; border-radius: 10px;
        font-family: 'Cairo', sans-serif; font-weight: 600; font-size: 13px;
        cursor: pointer; transition: all 0.2s ease;
        background: var(--brand); color: #fff;
      }
      .btn:hover { background: var(--brand-dark); transform: translateY(-1px); }
      .btn:active { transform: scale(0.97); }
      .btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
      .btn.outline { background: transparent; color: var(--brand); border: 2px solid var(--brand); }
      .btn.outline:hover { background: var(--brand-light); }
      .btn.danger { background: var(--err); }
      .btn.danger:hover { background: #dc2626; }
      .btn.full { grid-column: 1 / -1; }
      .btn .icon { font-size: 16px; }
      .trigger-list {
        margin-top: 12px; font-size: 12px; background: #f9f9fb;
        border-radius: 8px; padding: 10px 12px;
        max-height: 150px; overflow-y: auto; display: none;
      }
      .trigger-list.show { display: block; }
      .trigger-item { padding: 4px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
      .trigger-item:last-child { border-bottom: none; }
      .trigger-empty { color: var(--muted); text-align: center; padding: 8px; }
      .logs-wrapper { max-height: 320px; overflow-y: auto; margin-top: 8px; }
      .log-row {
        display: grid; grid-template-columns: 26px 1fr auto;
        gap: 8px; align-items: start;
        padding: 8px 4px; border-bottom: 1px solid #f0eef8; font-size: 12px;
      }
      .log-row:last-child { border-bottom: none; }
      .log-dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 5px; justify-self: center; }
      .log-dot.ok  { background: var(--ok); }
      .log-dot.err { background: var(--err); }
      .log-info strong { font-weight: 600; color: var(--text); }
      .log-info .details { color: var(--muted); display: block; word-break: break-word; }
      .log-meta { text-align: left; color: var(--muted); white-space: nowrap; font-size: 11px; }
      .logs-actions { display: flex; gap: 8px; margin-top: 10px; }
      .logs-actions .btn { font-size: 12px; padding: 8px 16px; }
      .overlay {
        display: none; position: fixed; inset: 0;
        background: rgba(255, 255, 255, 0.7);
        z-index: 999; align-items: center; justify-content: center;
        flex-direction: column; gap: 14px;
      }
      .overlay.show { display: flex; }
      .spinner {
        width: 46px; height: 46px;
        border: 4px solid var(--brand-light);
        border-top-color: var(--brand);
        border-radius: 50%; animation: spin 0.7s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .overlay-text { font-size: 14px; font-weight: 600; color: var(--brand); }
      .toast {
        position: fixed; bottom: 24px; left: 50%;
        transform: translateX(-50%) translateY(80px);
        padding: 12px 28px; border-radius: 10px; color: #fff;
        font-family: 'Cairo', sans-serif; font-weight: 600; font-size: 14px;
        z-index: 1000; transition: transform 0.35s ease, opacity 0.35s ease;
        opacity: 0; pointer-events: none;
      }
      .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
      .toast.success { background: var(--ok); }
      .toast.error   { background: var(--err); }
      .kanban-toolbar {
        display: flex; align-items: center;
        justify-content: space-between; flex-wrap: wrap; gap: 10px;
        margin-bottom: 14px;
      }
      .kanban-title-row { display: flex; align-items: center; gap: 10px; }
      .unsaved-pill {
        display: none; align-items: center; gap: 6px;
        background: #fff7ed; border: 1px solid #fed7aa;
        border-radius: 20px; padding: 3px 10px;
        font-size: 11px; font-weight: 600; color: #c2410c;
      }
      .unsaved-pill.show { display: flex; }
      .unsaved-dot {
        width: 6px; height: 6px; border-radius: 50%; background: #f97316;
        animation: blink 1.2s ease-in-out infinite;
      }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
      .kanban-btns { display: flex; gap: 8px; flex-wrap: wrap; }
      .kanban-btns .btn { font-size: 12px; padding: 8px 14px; }
      .board-scroll { overflow-x: auto; padding-bottom: 6px; }
      .board-scroll::-webkit-scrollbar { height: 5px; }
      .board-scroll::-webkit-scrollbar-track { background: var(--brand-light); border-radius: 4px; }
      .board-scroll::-webkit-scrollbar-thumb { background: var(--brand); border-radius: 4px; }
      .board { display: flex; gap: 12px; min-height: 240px; }
      .driver-col {
        flex: 0 0 185px;
        background: #f9f8fe; border: 1px solid #e5e2f8;
        border-radius: 10px; display: flex; flex-direction: column;
        transition: border-color .2s, box-shadow .2s;
      }
      .driver-col.drag-over { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-light); }
      .col-header {
        padding: 10px 12px 8px; border-bottom: 1px solid #e5e2f8;
        border-radius: 10px 10px 0 0; background: var(--brand-light);
      }
      .col-name { font-size: 12px; font-weight: 700; color: var(--brand); }
      .col-count {
        display: inline-block; margin-top: 3px;
        font-size: 10px; font-weight: 600;
        background: var(--brand); color: #fff;
        border-radius: 20px; padding: 1px 8px;
      }
      .card-list {
        flex: 1; padding: 8px;
        display: flex; flex-direction: column; gap: 5px; min-height: 60px;
      }
      .order-card {
        background: var(--card); border: 1px solid #e5e2f8;
        border-radius: 7px; padding: 7px 9px;
        font-size: 12px; font-weight: 600; cursor: grab;
        display: flex; align-items: center; gap: 7px;
        transition: box-shadow .15s, border-color .15s, transform .15s;
        user-select: none;
      }
      .order-card:hover { border-color: var(--brand); box-shadow: var(--shadow); transform: translateY(-1px); }
      .order-card.dragging { opacity: .35; cursor: grabbing; }
      .card-handle { color: var(--muted); font-size: 13px; flex-shrink: 0; }
      .card-name { flex: 1; color: var(--text); }
      .drop-ghost {
        height: 34px; border: 1.5px dashed var(--brand);
        border-radius: 7px; background: var(--brand-light); flex-shrink: 0;
      }
      .col-empty { text-align: center; padding: 16px 8px; color: var(--muted); font-size: 11px; pointer-events: none; }
      .board-empty {
        width: 100%; display: flex; align-items: center; justify-content: center;
        min-height: 140px; color: var(--muted); font-size: 13px; text-align: center;
      }
      @media (max-width: 500px) {
        .btn-grid { grid-template-columns: 1fr; }
        .stats-grid { grid-template-columns: 1fr 1fr; }
      }
    </style>
  </head>
  <body>

    <div class="overlay" id="overlay">
      <div class="spinner"></div>
      <div class="overlay-text" id="overlayText">جارٍ التنفيذ...</div>
    </div>
    <div class="toast" id="toast"></div>

    <div class="wrapper">

      <div class="header">
        <img src="LOGO_URL_HERE" alt="سلعة" />
        <h1>سلعة</h1>
        <p>موردك الأول في الدواجن</p>
      </div>

      <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
          <div class="num" id="statSent">--</div>
          <div class="lbl">Sent to Courier</div>
        </div>
        <div class="stat-card">
          <div class="num" id="statOrderId">--</div>
          <div class="lbl">لديها Order ID</div>
        </div>
        <div class="stat-card">
          <div class="num" id="statTotal">--</div>
          <div class="lbl">إجمالي الصفوف</div>
        </div>
        <div class="stat-card time-card">
          <div class="num" id="statTime">--</div>
          <div class="lbl">آخر تحديث</div>
        </div>
      </div>

      <div class="section">
        <div class="section-title"><span>📊</span> نتائج التوزيع</div>
        <div id="distTableWrap">
          <p style="color:var(--muted);text-align:center;font-size:13px">جارٍ تحميل الجدول...</p>
        </div>
      </div>

      <div class="section">
        <div class="section-title"><span>⚙️</span> العمليات</div>
        <div class="btn-grid">
          <button class="btn" onclick="run('opFetchUpload','رفع طلبات Shipday')">
            <span class="icon">📤</span> رفع طلبات Shipday (غدًا)
          </button>
          <button class="btn" onclick="run('opUpdateExisting','تحديث طلبات Shipday')">
            <span class="icon">🔄</span> تحديث طلبات Shipday
          </button>
          <button class="btn" onclick="runSweep()">
            <span class="icon">🧹</span> توزيع Sweep
          </button>
          <button class="btn" onclick="run('opDistributeToMain','توزيع إلى Main')">
            <span class="icon">🚚</span> توزيع إلى Main
          </button>
          <button class="btn full" onclick="run('opFillMissingIds','تعبئة OrderIds')">
            <span class="icon">🔢</span> تعبئة OrderIds الناقصة
          </button>
        </div>
      </div>

      <div class="section">
        <div class="kanban-toolbar">
          <div class="kanban-title-row">
            <div class="section-title" style="margin-bottom:0"><span>🗂️</span> التوزيع اليدوي</div>
            <div class="unsaved-pill" id="unsavedPill">
              <div class="unsaved-dot"></div>
              تعديلات غير محفوظة
            </div>
          </div>
          <div class="kanban-btns">
            <button class="btn outline" onclick="loadBoard()"><span class="icon">🔃</span> تحميل اللوحة</button>
            <button class="btn outline" id="resetBtn" onclick="resetBoard()" disabled><span class="icon">↩️</span> تراجع</button>
            <button class="btn" id="pushBtn" onclick="pushBoard()" disabled><span class="icon">🚀</span> حفظ وإرسال إلى Main</button>
          </div>
        </div>
        <div class="board-scroll">
          <div class="board-empty" id="boardEmpty">
            <div>
              <div style="font-size:26px;margin-bottom:6px;opacity:.35">🗂️</div>
              <div>شغّل توزيع Sweep أو اضغط "تحميل اللوحة"</div>
            </div>
          </div>
          <div class="board" id="board" style="display:none"></div>
        </div>
      </div>

      <div class="section">
        <div class="section-title"><span>⏱️</span> التريقرات</div>
        <div class="btn-grid">
          <button class="btn outline" onclick="run('opSetupTrigger','إنشاء Trigger')">
            <span class="icon">➕</span> إنشاء Trigger / 5 د
          </button>
          <button class="btn danger" onclick="run('opDeleteTriggers','حذف Triggers')">
            <span class="icon">🗑</span> حذف Triggers
          </button>
          <button class="btn outline full" onclick="loadTriggers()">
            <span class="icon">👁️</span> عرض التريقرات الحالية
          </button>
        </div>
        <div class="trigger-list" id="triggerList"></div>
      </div>

      <div class="section">
        <div class="section-title"><span>📜</span> سجل آخر العمليات</div>
        <div class="logs-wrapper" id="logsWrap">
          <p style="color:var(--muted);text-align:center;font-size:13px">جارٍ التحميل...</p>
        </div>
        <div class="logs-actions">
          <button class="btn outline" onclick="loadLogs()">تحديث السجل</button>
          <button class="btn danger"  onclick="doClearLogs()">مسح السجل</button>
        </div>
      </div>

    </div>

    <script>
      var GAS_URL = 'https://script.google.com/macros/s/AKfycbxegmfzxtzmJtNiByBzQlPwnqGc_5Lk-kRUYreoigwd09COy1hRhLZTrRvvB_dYnr-I/exec';

      function $(id){ return document.getElementById(id); }
      function showOverlay(msg){ $('overlayText').textContent=msg||'جارٍ التنفيذ...'; $('overlay').classList.add('show'); }
      function hideOverlay(){ $('overlay').classList.remove('show'); }
      var _tt=null;
      function toast(msg,type){
        var el=$('toast'); el.textContent=msg;
        el.className='toast '+(type||'success');
        clearTimeout(_tt);
        requestAnimationFrame(function(){ el.classList.add('show'); });
        _tt=setTimeout(function(){ el.classList.remove('show'); },3500);
      }
      function disableButtons(state){ document.querySelectorAll('.btn').forEach(function(b){ b.disabled=state; }); }
      function esc(s){
        if(s==null)return'';
        var d=document.createElement('div');
        d.appendChild(document.createTextNode(String(s)));
        return d.innerHTML;
      }

      function jsonp(action,params,cb){
        var name='_gcb_'+Date.now()+'_'+Math.floor(Math.random()*1e7);
        var script=document.createElement('script');
        var timer;
        window[name]=function(r){ clearTimeout(timer); cleanup(); cb(r,null); };
        script.onerror=function(){ clearTimeout(timer); cleanup(); cb(null,new Error('تعذّر الاتصال — تأكد من النشر كـ Anyone')); };
        timer=setTimeout(function(){ cleanup(); cb(null,new Error('انتهت مهلة الطلب')); },90000);
        var qs='action='+encodeURIComponent(action)+'&callback='+encodeURIComponent(name);
        if(params) Object.keys(params).forEach(function(k){ qs+='&'+encodeURIComponent(k)+'='+encodeURIComponent(params[k]); });
        script.src=GAS_URL+'?'+qs;
        document.head.appendChild(script);
        function cleanup(){ delete window[name]; if(script.parentNode)script.parentNode.removeChild(script); }
      }

      function run(fnName,label){
        showOverlay(label+'...');
        disableButtons(true);
        jsonp(fnName,null,function(r,err){
          hideOverlay(); disableButtons(false);
          if(err){ toast(err.message,'error'); return; }
          if(r&&r.ok){ toast(label+' ✅ ('+r.duration+' ث)','success'); }
          else { toast((r&&r.message)||'خطأ غير معروف','error'); }
          loadStats(); loadLogs();
          if(fnName==='opDistributeSweep'||fnName==='opDistributeToMain') loadDistTable();
        });
      }

      function runSweep(){
        showOverlay('توزيع Sweep...');
        disableButtons(true);
        jsonp('opDistributeSweep',null,function(r,err){
          hideOverlay(); disableButtons(false);
          if(err){ toast(err.message,'error'); return; }
          if(r&&r.ok){
            toast('توزيع Sweep ✅ ('+r.duration+' ث)','success');
            loadDistTable();
            setTimeout(loadBoard,400);
          } else { toast((r&&r.message)||'خطأ','error'); }
          loadStats(); loadLogs();
        });
      }

      function loadStats(){
        jsonp('getStats',null,function(r,err){
          if(err||!r||!r.ok)return;
          $('statSent').textContent=r.sentToCourier;
          $('statOrderId').textContent=r.withOrderId;
          $('statTotal').textContent=r.totalRows;
          $('statTime').textContent=r.now;
        });
      }
      function loadDistTable(){
        jsonp('getDistributionTable',null,function(r,err){
          var wrap=$('distTableWrap');
          if(err||!r||!r.ok){
            wrap.innerHTML='<p style="color:var(--err);text-align:center;font-size:13px">'+esc((err&&err.message)||(r&&r.message)||'خطأ')+'</p>';
            return;
          }
          if(!r.headers||!r.headers.length){
            wrap.innerHTML='<p style="color:var(--muted);text-align:center;font-size:13px">لا توجد بيانات</p>';
            return;
          }
          var html='<table class="dist-table"><thead><tr>';
          r.headers.forEach(function(h){ html+='<th>'+esc(String(h))+'</th>'; });
          html+='</tr></thead><tbody>';
          r.rows.forEach(function(row){
            html+='<tr>';
            row.forEach(function(cell){ html+='<td>'+esc(String(cell))+'</td>'; });
            html+='</tr>';
          });
          html+='</tbody></table>';
          wrap.innerHTML=html;
        });
      }
      function loadLogs(){
        jsonp('getRecentLogs',{limit:12},function(r,err){
          var wrap=$('logsWrap');
          if(err||!r||!r.ok||!r.logs||!r.logs.length){
            wrap.innerHTML='<p style="color:var(--muted);text-align:center;font-size:13px">لا توجد سجلات بعد</p>';
            return;
          }
          var html='';
          r.logs.forEach(function(lg){
            var cls=lg.status==='OK'?'ok':'err';
            html+='<div class="log-row">'
                +'<div class="log-dot '+cls+'"></div>'
                +'<div class="log-info"><strong>'+esc(lg.task)+'</strong>'
                +'<span class="details">'+esc(lg.details)+'</span></div>'
                +'<div class="log-meta">'+esc(lg.timestamp)+'<br>'+(lg.duration||'0')+' ث</div>'
                +'</div>';
          });
          wrap.innerHTML=html;
        });
      }
      function loadTriggers(){
        var list=$('triggerList');
        list.classList.add('show');
        list.innerHTML='<p style="color:var(--muted);text-align:center">جارٍ التحميل...</p>';
        jsonp('opListTriggers',null,function(r,err){
          if(err||!r||!r.ok||!r.triggers||!r.triggers.length){
            list.innerHTML='<div class="trigger-empty">لا توجد تريقرات حالياً</div>';
            return;
          }
          var html='';
          r.triggers.forEach(function(t){
            html+='<div class="trigger-item"><span>'+esc(t.handler)+'</span>'
                +'<span style="color:var(--muted)">'+esc(t.type)+'</span></div>';
          });
          list.innerHTML=html;
        });
      }
      function doClearLogs(){
        if(!confirm('هل تريد مسح جميع السجلات؟'))return;
        showOverlay('مسح السجل...');
        jsonp('clearLogs',null,function(r,err){
          hideOverlay();
          if(err){ toast(err.message,'error'); return; }
          if(r&&r.ok){ toast('تم مسح السجل ✅','success'); loadLogs(); }
          else toast((r&&r.message)||'خطأ','error');
        });
      }

      var _original=null,_state=null,_dragging=null,_fromCol=null,_ghost=null;

      function loadBoard(){
        $('boardEmpty').style.display='flex';
        $('board').style.display='none';
        $('boardEmpty').innerHTML='<div><div style="font-size:26px;margin-bottom:6px;opacity:.35">⏳</div><div>جارٍ تحميل اللوحة...</div></div>';
        jsonp('getDistributionBoard',null,function(r,err){
          if(err||!r||!r.ok){
            $('boardEmpty').innerHTML='<div style="color:var(--err)">'+esc((err&&err.message)||(r&&r.message)||'خطأ')+'</div>';
            return;
          }
          if(!r.headers||!r.headers.length){
            $('boardEmpty').innerHTML='<div><div style="font-size:26px;margin-bottom:6px;opacity:.35">📭</div><div>لا توجد بيانات. شغّل توزيع Sweep أولاً.</div></div>';
            return;
          }
          _original=deepCopy(r); _state=deepCopy(r);
          renderBoard(_state); setUnsaved(false);
        });
      }
      function renderBoard(state){
        var board=$('board'); board.innerHTML='';
        state.headers.forEach(function(header,ci){ board.appendChild(makeColumn(header,state.columns[ci],ci)); });
        $('boardEmpty').style.display='none'; board.style.display='flex';
        $('pushBtn').disabled=false; $('resetBtn').disabled=false;
      }
      function makeColumn(header,orders,ci){
        var col=document.createElement('div');
        col.className='driver-col'; col.dataset.col=ci;
        var hd=document.createElement('div'); hd.className='col-header';
        hd.innerHTML='<div class="col-name">'+esc(header)+'</div>'
                    +'<span class="col-count" id="cnt-'+ci+'">'+orders.length+'</span>';
        col.appendChild(hd);
        var list=document.createElement('div'); list.className='card-list'; list.dataset.col=ci;
        if(!orders.length){ list.innerHTML='<div class="col-empty">فارغ — اسحب هنا</div>'; }
        else { orders.forEach(function(name){ list.appendChild(makeCard(name)); }); }
        list.addEventListener('dragover',onDragOver);
        list.addEventListener('dragleave',onDragLeave);
        list.addEventListener('drop',onDrop);
        col.appendChild(list); return col;
      }
      function makeCard(name){
        var card=document.createElement('div');
        card.className='order-card'; card.draggable=true; card.dataset.name=name;
        card.innerHTML='<span class="card-handle">⠿</span><span class="card-name">'+esc(name)+'</span>';
        card.addEventListener('dragstart',onDragStart);
        card.addEventListener('dragend',onDragEnd);
        return card;
      }
      function onDragStart(e){ _dragging=this; _fromCol=this.closest('.card-list').dataset.col; this.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; e.dataTransfer.setData('text/plain',this.dataset.name); }
      function onDragEnd(){ if(_dragging)_dragging.classList.remove('dragging'); _dragging=null; _fromCol=null; removeGhost(); document.querySelectorAll('.driver-col.drag-over').forEach(function(c){ c.classList.remove('drag-over'); }); }
      function onDragOver(e){ e.preventDefault(); e.dataTransfer.dropEffect='move'; this.closest('.driver-col').classList.add('drag-over'); removeGhost(); _ghost=document.createElement('div'); _ghost.className='drop-ghost'; var after=getDragAfterEl(this,e.clientY); if(after)this.insertBefore(_ghost,after); else this.appendChild(_ghost); }
      function onDragLeave(e){ if(!this.contains(e.relatedTarget)){ this.closest('.driver-col').classList.remove('drag-over'); removeGhost(); } }
      function onDrop(e){
        e.preventDefault(); removeGhost();
        var targetList=this,toCol=targetList.dataset.col;
        targetList.closest('.driver-col').classList.remove('drag-over');
        if(!_dragging)return;
        var after=getDragAfterEl(targetList,e.clientY);
        var empty=targetList.querySelector('.col-empty'); if(empty)empty.remove();
        if(after)targetList.insertBefore(_dragging,after); else targetList.appendChild(_dragging);
        if(_fromCol!==toCol){
          var src=document.querySelector('.card-list[data-col="'+_fromCol+'"]');
          if(src&&!src.querySelectorAll('.order-card').length){
            var msg=document.createElement('div'); msg.className='col-empty'; msg.textContent='فارغ — اسحب هنا'; src.appendChild(msg);
          }
        }
        syncState();
      }
      function getDragAfterEl(container,y){
        var cards=Array.from(container.querySelectorAll('.order-card:not(.dragging)'));
        return cards.reduce(function(closest,child){
          var box=child.getBoundingClientRect(),offset=y-(box.top+box.height/2);
          if(offset<0&&offset>closest.offset)return{offset:offset,element:child};
          return closest;
        },{offset:-Infinity,element:null}).element;
      }
      function removeGhost(){ if(_ghost&&_ghost.parentNode)_ghost.parentNode.removeChild(_ghost); _ghost=null; }
      function syncState(){
        document.querySelectorAll('.driver-col').forEach(function(col,ci){
          var names=[]; col.querySelectorAll('.order-card').forEach(function(c){ names.push(c.dataset.name); });
          _state.columns[ci]=names;
          var cnt=$('cnt-'+ci); if(cnt)cnt.textContent=names.length;
        });
        setUnsaved(true);
      }
      function setUnsaved(v){ $('unsavedPill').className='unsaved-pill'+(v?' show':''); }
      function resetBoard(){
        if(!_original)return;
        _state=deepCopy(_original); renderBoard(_state); setUnsaved(false);
        toast('تم التراجع ↩️','success');
      }
      function pushBoard(){
        if(!_state||!_state.headers.length){ toast('لا توجد بيانات للإرسال','error'); return; }
        showOverlay('حفظ اللوحة وإرسالها إلى Main...');
        disableButtons(true);
        jsonp('opSaveAndPushToMain',{board:JSON.stringify(_state)},function(r,err){
          hideOverlay(); disableButtons(false);
          if(err){ toast(err.message,'error'); return; }
          if(r&&r.ok){
            toast('✅ اللوحة أُرسلت إلى Main ('+r.duration+' ث)','success');
            _original=deepCopy(_state); setUnsaved(false);
            $('pushBtn').disabled=false; $('resetBtn').disabled=false;
          } else { toast((r&&r.message)||'خطأ','error'); }
          loadStats(); loadLogs();
        });
      }
      function deepCopy(o){ return JSON.parse(JSON.stringify(o)); }

      loadStats();
      loadDistTable();
      loadLogs();
    </script>
  </body>
</html>
